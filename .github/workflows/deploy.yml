name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout masterclass repo
        uses: actions/checkout@v4
        with:
          repository: albegosu/unir-masterclass-albertoglez
          path: _masterclass

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: _masterclass/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: _masterclass

      - name: Build masterclass
        run: npm run build -- --base=/albegosu/unir-masterclass/
        working-directory: _masterclass

      - name: Inject back button into masterclass
        run: |
          sed -i 's|</body>|<a href="/albegosu/" style="position:fixed;top:16px;left:16px;z-index:9999;display:inline-flex;align-items:center;gap:6px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;font-size:13px;color:#5f5e5a;text-decoration:none;background:#ffffff;border:0.5px solid rgba(0,0,0,0.11);border-radius:8px;padding:6px 10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);" onmouseover="this.style.color='"'"'#1a1a18'"'"';this.style.borderColor='"'"'rgba(0,0,0,0.22)'"'"'" onmouseout="this.style.color='"'"'#5f5e5a'"'"';this.style.borderColor='"'"'rgba(0,0,0,0.11)'"'"'"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>Volver al inicio</a></body>|' _masterclass/dist/index.html

      - name: Assemble site
        run: |
          mkdir -p _site
          cp *.html _site/
          [ -d assets ] && cp -r assets _site/
          cp -r _masterclass/dist _site/unir-masterclass

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
