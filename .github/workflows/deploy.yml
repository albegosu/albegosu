name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout masterclass repo
        uses: actions/checkout@v4
        with:
          repository: albegosu/unir-masterclass-albertoglez
          path: _masterclass

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: _masterclass/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: _masterclass

      - name: Build masterclass
        run: npm run build -- --base=/albegosu/unir-masterclass/
        working-directory: _masterclass

      - name: Assemble site
        run: |
          mkdir -p _site
          cp *.html _site/
          [ -d assets ] && cp -r assets _site/
          cp -r _masterclass/dist _site/unir-masterclass

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
